name: "Learning gihub actions"
on: [push]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: "Checkout code"
              uses: actions/checkout@v2
              with:
                fetch-depth: 0
            - name: "Run a one-line script"
              run: echo "Hello, world!"
            - name: "Run a multi-line script"
              run: |
                echo "Add other actions to build, test, and deploy your project."
                git status
                git log
                git branch
                pwd
                which node
                node --version
                which npm
                npm --version
            - name: "Run a multi-line script with an environment variable"
              env:
                GREETING: "Hello, world!"
              run: |
                echo "$GREETING"  
                echo "This is a multi-line script that uses an environment variable."

    deploy:
        runs-on: ubuntu-latest
        needs: [build]
        steps:
            - name: "Deploy to production"
              run: echo "Deploying to production..."            
            - name: "Install sf cli"
              run: npm install -g @salesforce/cli  
