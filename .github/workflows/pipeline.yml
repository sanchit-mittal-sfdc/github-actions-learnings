name: "Salesforce CI/CD Pipeline"
on:
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub Actions tab along with variable inputs

  pull_request:
    paths: ["force-app/**", ".github/workflows/*"] # This ensures that the workflow is triggered only when there are changes in the force-app directory, which is typically where the Salesforce metadata and code are stored. This allows for more efficient CI/CD processes by only triggering deployments when relevant changes are made, rather than for every PR regardless of the files changed.
    branches: # Here branches are target branches for PRs, so if a PR is raised targeting any of these branches, the workflow will be triggered. This allows for automated checks and deployments to be performed when changes are proposed to these specific branches, ensuring that the code being merged meets the necessary quality and deployment standards.
      - main
      - uat
      - qa
      - int
    
    types: [opened, synchronize, reopened] # This ensures that the workflow is triggered not only when a PR is opened but also when it is updated (synchronize) or reopened after being closed. This allows for continuous validation of the changes proposed in the PR, ensuring that any updates to the code are also checked and deployed as necessary.  
  
   
  push: # This will trigger the workflow whenever there is a push to the specified branches. This allows for automated deployments to be performed whenever changes are pushed directly to these branches, ensuring that the latest code is always deployed to the respective environments without requiring manual intervention.
    paths: ["force-app/**", ".github/workflows/*"] # This ensures that the workflow is triggered only when there are changes in the force-app directory, which is typically where the Salesforce metadata and code are stored. This allows for more efficient CI/CD processes by only triggering deployments when relevant changes are made, rather than for every push to the branch regardless of the files changed.
    branches:
      - main
      - uat
      - qa
      - int


      
jobs:
  
  validate:

    # This condition ensures that the validate job runs only for pull request events targeting the specified branches (main, uat, qa, int). This allows for automated validation of changes proposed in pull requests before they are merged into the target branches, ensuring that any issues or errors are caught early in the development process and that only validated code is merged into these critical branches.
    # Also, this jpb runs for push and workflow_dispatch events on the specified branches, so that before deployment, validation can be done for the changes that are directly pushed to these branches or when the workflow is manually triggered for these branches. This helps in maintaining code quality and stability in the main, uat, qa, and int branches by ensuring that all changes undergo validation before being deployed to their respective environments.
    # In pull_request event, base_ref is the target branch into which the PR is proposed to be merged, and head_ref is the source branch from which the PR is created. So in this condition we are checking if the event is pull_request and the base_ref (target branch) is either main, uat, qa or int, then only this validate job will run. For example, if a PR is raised from feature/abc branch to main branch, then base_ref will be main and head_ref will be feature/abc. Since base_ref is main which is in our specified branches, the validate job will run for this PR. However, if a PR is raised from feature/abc branch to another feature branch like feature/xyz, then base_ref will be feature/xyz which is not in our specified branches, so the validate job will not run for this PR.
    if: ${{ ( github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'uat' || github.base_ref == 'qa' || github.base_ref == 'int') ) || ( (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'uat' || github.ref_name == 'qa' || github.ref_name == 'int') ) }}

    # This is where we set the environment variable VALIDATE_ENV based on the branch name. The value of VALIDATE_ENV is determined using a conditional expression that checks the branch name (github.ref_name) and assigns the corresponding environment value (production1 for main, uat for uat, qa for qa, and int for int). Just using this to print the environemnt in the steps and not using it to set the environment for the job because job-level environment is resolved before runtime env variables and hence we cannot use this variable to set the environment for the job. We will have to duplicate the logic to set the environment for the job directly based on the branch name in the environment key.
    env:
      VALIDATE_ENV: ${{ ( (github.base_ref == 'main' || github.ref_name == 'main') && 'production') || ( (github.base_ref == 'uat' || github.ref_name == 'uat') && 'uat') || ( (github.base_ref == 'qa' || github.ref_name == 'qa') && 'qa') || ( (github.base_ref == 'int' || github.ref_name == 'int') && 'int') }}
    

    # V.Imp: not same as env which is for setting environment variables rather this is for setting the environment for the job which allows for environent-specific configration automatially For eg If environment is production then credentials of production is used and if environment is uat then credentials of uat is used and so on. This is a special feature of GitHub Actions that allows you to define different environments for your jobs, which can have their own secrets, variables, and protection rules. By setting the environment based on the branch name, you can ensure that the correct configurations and credentials are used for each environment, providing a more secure and organized deployment process. 
    # WE NEED NOT MANAGE diff secrets like SF_USERNAME_Prod, SF_USERNAME_UAT etc. Instead we can just use the same secret name like SF_USERNAME and based on the environment set for the job, it will automatically pick the correct value from the secrets defined for that environment. This simplifies secret management and reduces the chances of errors in using incorrect secrets for different environments. For example, if the job is running for main branch and we have set VALIDATE_ENV to production1, then it will automatically use the secrets defined for production1 environment when we reference those secrets in our steps.  
    # Set the environment based on the branch name. This allows for environment-specific configurations and deployments, ensuring that changes are deployed to the correct environment based on the branch being pushed or manually triggered. The use of logical OR (||) ensures that the correct environment is selected based on the branch name, providing a clear mapping between branches and their corresponding environments.
    # You might be thinking when i manually run the workflow from the GitHub Actions tab, there is no push-to-branch associated with it, so how will this condition work? Well it does have since you need to select the branch while triggering the workflow manually, so it will take the branch name you select and set the environment accordingly. For example, if you select main branch while triggering the workflow manually, it will set the environment to production.
    
    # Below I cant use environmnt variable VALIDATE_ENV to set the environment and rather i have to duolciate the logic BECAUSE job-level environment resolve hota hai before runtime env variables. So at the time of resolving the environment for the job, the VALIDATE_ENV variable is not yet set and hence it cannot be used in the environment key. This is a common scenario in GitHub Actions where job-level environment variables cannot be used to determine the environment for the job itself, as they are not yet available at the time of job initialization. Therefore, we have to duplicate the logic to set the environment directly based on the branch name in the environment key, ensuring that the correct environment is set for the job based on the branch that triggered it.  
    environment: ${{ ( (github.base_ref == 'main' || github.ref_name == 'main') && 'production') || ( (github.base_ref == 'uat' || github.ref_name == 'uat') && 'uat') || ( (github.base_ref == 'qa' || github.ref_name == 'qa') && 'qa') || ( (github.base_ref == 'int' || github.ref_name == 'int') && 'int') }} # Set the environment based on the target branch of the pull request. This allows for environment-specific validation and testing, ensuring that changes proposed in the pull request are validated against the correct environment configurations and dependencies. For example, if a PR is raised targeting main branch, the environment will be set to production for this validate job, allowing for validation against production-like configurations and dependencies. If a PR is raised targeting uat branch, the environment will be set to uat, and so on for qa and int branches.

    runs-on: "ubuntu-latest"
    
    steps:

       # Print the Environment to which we are validating. This is useful for debugging and ensuring that the correct environment is being targeted for deployment based on the branch name.
       - name: "Print Target Environment"
         run: |
           echo "Validating in environment: ${{ env.VALIDATE_ENV }}" # This will print the environment that has been set for this job, which is determined by the branch name. For example
       
       # Checkout the code 
       - name: "Checkout code"
         uses: actions/checkout@v6
         with:
           fetch-depth: 0 # Fetch all history for all branches and tags

       # Just quickly check the values of
       - name: "Print values of currently checked out branch and event details"
         run: |
           echo "base_ref (Target Branch for PR): ${{ github.base_ref }}" # This gives the target branch of the PR, for eg main, uat, feature/abc etc. without refs/heads/ prefix. It will be empty for push and workflow_dispatch events since they are not associated with a PR.
           echo "head_ref (Source Branch for PR): ${{ github.head_ref }}" # This gives the source branch of the PR, for eg feature/abc, feature/xyz etc. without refs/heads/ prefix. It will be empty for push and workflow_dispatch events since they are not associated with a PR.
           echo "Branch/Ref Name: ${{ github.ref_name }}"                 # 
           echo "Event Name: ${{ github.event_name }}"                    # 
           echo "Ref: ${{ github.ref }}"                                  #  
          
           # VIMP:The cirrent checkout branch is determined by the ref that triggered the workflow. So if the workflow was triggered by a push to main branch, then main branch will be checked out. If it was triggered by a push to feature/abc branch, then feature/abc branch will be checked out onto the latest commit of that branch. If it was triggered manually and you select main branch while triggering, then main branch will be checked out.
           echo "VIMP:The cirrent checkout branch is determined by the ref that triggered the workflow. So if the workflow was triggered by a push to main branch, then main branch will be checked out. If it was triggered by a push to feature/abc branch, then feature/abc branch will be checked out onto the latest commit of that branch. If it was triggered manually and you select main branch while triggering, then main branch will be checked out."
           git branch                                      # This will show the currently checked out branch with an asterisk (*) next to it. For example, if main branch is checked out, it will show * main. 
           echo " test_level in repository variable: ${vars.TEST_LEVEL}" # This is just to check if the value of TEST_LEVEL variable is coming correctly or not. This variable is used in the deployment step to specify the level of tests to run during deployment. By printing it here, we can confirm that it's being set correctly based on the inputs provided when triggering the workflow or from the repository variables.


      # Install salesforce cli    
       - name: "Install Salesforce CLI"
         run: |
           npm install @salesforce/cli --global
           which sf
           command -v sf
           pwd

      # Verify Salesforce CLI installation     
       - name: "Check if Salesforce CLI is working"
         run: command -v sf # Just this command is enough to check if the CLI is installed and working, because if the command is not found, it will return a non-zero exit code which will cause the workflow to fail. There is no need to check for version or any other command, as the presence of the sf command itself indicates that the CLI is installed and can be executed successfully.

          # EARLIER I WAS USING BELOW CODE TO CHECK IF THE CLI IS WORKING OR NOT, BUT IT WAS UNNECESSARY AND CAN BE SIMPLIFIED TO JUST CHECKING THE PRESENCE OF THE COMMAND USING command -v sf. THE REASON FOR THIS IS THAT IF THE CLI IS NOT INSTALLED OR NOT WORKING PROPERLY, THEN command -v sf WILL RETURN A NON-ZERO EXIT CODE, CAUSING THE WORKFLOW TO FAIL IMMEDIATELY. THERE IS NO NEED TO CHECK FOR VERSION OR ANY OTHER COMMAND, AS THE PRESENCE OF THE sf COMMAND ITSELF INDICATES THAT THE CLI IS INSTALLED AND CAN BE EXECUTED SUCCESSFULLY.
          #  if sf --version | grep "/" ; then
          #    echo "Salesforce CLI is installed and working."
          #  else
          #    echo "Salesforce CLI installation failed."
          #    exit 1
          #  fi
       # Create jwt key file from the content stored in GitHub secrets
       - name: "Create JWT Key File"
         run: |
           echo "${{ secrets.JWT_KEY_FILE_CONTENT }}" > server.key 
           # Set appropriate permissions for the key file i.e. RW for owner only
           chmod 600 server.key 


     # Verify that the JWT key file has been created successfully and has the correct permissions. This step is crucial to ensure that the authentication process can proceed without issues, as an improperly created key file can lead to authentication failures.
       - name: "Verify JWT Key File Creation"
         run: |
           if [ -f server.key ]; then # -f means check for file. Other options are -d for directory, -e for existence (file or directory), etc. In this case, we want to check if the file has been created successfully before proceeding with authentication.
             echo "JWT key file created successfully."
             ls -l server.key # This will show the permissions of the file, which should be -rw------- (600) for security reasons.
           else
             echo "Failed to create JWT key file."
             exit 1
           fi      

      # Authenticate to Salesforce org using JWT-based flow
       - name: "Authenticate to Salesforce Org"
         run: |
           sf org login jwt \
             --client-id ${{ secrets.CLIENT_ID }} \
             --jwt-key-file server.key \
             --username ${{ vars.USERNAME }} \
             --set-default \
             --instance-url ${{ vars.INSTANCE_URL }}


      # Verify authentication by displaying the authenticated org's username
       - name: "Verify Authentication"
         run: |
            echo "There's no need of explicitly checking for the authenticated org's username to verify authentication, because if the authentication fails, the previous command (sf org login jwt) will return a non-zero exit code, causing the workflow to fail immediately. However, if you still want to check the authenticated org's username for confirmation, you can do so by running sf org list command which will display the list of authenticated orgs along with their usernames. If the authentication was successful, you should see the username of the authenticated org in the output of sf org list command. If there is an issue with authentication, this command will not return the expected output and may also return a non-zero exit code, further confirming that there was an authentication failure."
            sf org list

       - name: "Validate"
         if: ${{ vars.IS_RUN_VALIDATION == 'true' }} # This condition allows you to control whether the validation step should be executed or not based on the value of the IS_RUN_VALIDATION variable. By setting this variable to 'true' or 'false' in your workflow_dispatch inputs or as an repository variable, you can easily enable or disable the validation step without having to modify the workflow code itself. This provides flexibility in your CI/CD pipeline, allowing you to skip validation when it's not necessary (e.g., for quick deployments) or to enforce validation when it's critical (e.g., for production deployments).
         run: |
            echo "Perform your validation steps here, such as running tests, static code analysis, or any other checks that are necessary to validate the changes against the target environment. This is where you would implement the specific validation logic that is relevant to your Salesforce deployment process, ensuring that the changes meet the required standards and do not introduce any issues before they are deployed to the respective environments."
            sf project deploy validate --target-org ${{ vars.USERNAME }} -x manifest/package.xml --test-level ${{ vars.TEST_LEVEL }} --wait 60 
        
      # Cean up the JWT key file at last. This will ensure that the key file is not left on the runner after the workflow completes, enhancing security by minimizing the risk of unauthorized access to the key file.
       - name: "Clean Up JWT Key File"
         if: always() # This ensures that the cleanup step runs regardless of the success or failure of previous steps, ensuring that the key file is removed in all scenarios.
         run: |
           # Remove the JWT key file to prevent unauthorized access -f flag is used to force deletion without prompting for confirmation, which is useful in automated scripts to ensure that the cleanup process is not interrupted.
           rm -f server.key     

           # verify that the key file has been removed successfully
           # [ ... ] this is test command to check if the file exists. -f seraches for file only in the current directory and returns true if the file exists and is a regular file. 
           # CONT.. Other options are -d for directory, -e for existence (file or directory), etc. In this case, we want to check if the file still exists after attempting to remove it, 
           # CONT.. which would indicate a failure in the cleanup process.
           # Reason for using this [] over ls | grep is that the latter can be less reliable in scripts, especially if there are multiple files or if the file name contains spaces or special characters. The test command with -f provides a more direct and reliable way to check for the existence of a specific file.
           
           if [ -f server.key ]; then 
             echo "Failed to remove the JWT key file."
             exit 1 # Exit with a non-zero status to indicate failure, which can be useful for debugging and ensuring that the workflow does not proceed if the cleanup step fails.
           else
             echo "JWT key file removed successfully."
           fi
   
  
  










  
  
  deploy:
    
    # This condition ensures that the deploy job runs for both push and workflow_dispatch events, allowing for flexibility in how the pipeline is triggered. It checks if the event is either a push or a manual trigger, ensuring that the deployment process can be initiated in both scenarios. Also it checks if the branch is main, uat, qa or int, ensuring that deployments are only triggered for these specific branches, preventing this job to run when code is pushed to other branches like feature branches. This helps in maintaining a controlled deployment process, where only changes from specific branches are deployed to the respective environments, reducing the risk of unintended deployments and ensuring that the deployment process is aligned with the branching strategy of the project.
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'uat' || github.ref_name == 'qa' || github.ref_name == 'int') }} 
    needs: [validate]
    # The use of 'ubuntu-latest' as the runner provides a stable and widely used environment for running the CI/CD pipeline, ensuring compatibility with a wide range of tools and dependencies commonly used in Salesforce development and deployment processes. It also allows for easy maintenance and updates, as GitHub regularly updates the 'ubuntu-latest' image with the latest security patches and software versions.
    runs-on: ubuntu-latest


    # This is where we set the environment variable DEPLOY_ENV based on the branch name. The value of DEPLOY_ENV is determined using a conditional expression that checks the branch name (github.ref_name) and assigns the corresponding environment value (production1 for main, uat for uat, qa for qa, and int for int). Just using this to print the environemnt in the steps and not using it to set the environment for the job because job-level environment is resolved before runtime env variables and hence we cannot use this variable to set the environment for the job. We will have to duplicate the logic to set the environment for the job directly based on the branch name in the environment key.
    env:
      DEPLOY_ENV: ${{ (github.ref_name == 'main' && 'production') || (github.ref_name == 'uat' && 'uat') || (github.ref_name == 'qa' && 'qa') || (github.ref_name == 'int' && 'int') }}
    

    # V.Imp: not same as env which is for setting environment variables rather this is for setting the environment for the job which allows for environent-specific configration automatially For eg If environment is production then credentials of production is used and if environment is uat then credentials of uat is used and so on. This is a special feature of GitHub Actions that allows you to define different environments for your jobs, which can have their own secrets, variables, and protection rules. By setting the environment based on the branch name, you can ensure that the correct configurations and credentials are used for each environment, providing a more secure and organized deployment process. 
    # WE NEED NOT MANAGE diff secrets like SF_USERNAME_Prod, SF_USERNAME_UAT etc. Instead we can just use the same secret name like SF_USERNAME and based on the environment set for the job, it will automatically pick the correct value from the secrets defined for that environment. This simplifies secret management and reduces the chances of errors in using incorrect secrets for different environments. For example, if the job is running for main branch and we have set DEPLOY_ENV to production1, then it will automatically use the secrets defined for production1 environment when we reference those secrets in our steps.  
    # Set the environment based on the branch name. This allows for environment-specific configurations and deployments, ensuring that changes are deployed to the correct environment based on the branch being pushed or manually triggered. The use of logical OR (||) ensures that the correct environment is selected based on the branch name, providing a clear mapping between branches and their corresponding environments.
    # You might be thinking when i manually run the workflow from the GitHub Actions tab, there is no push-to-branch associated with it, so how will this condition work? Well it does have since you need to select the branch while triggering the workflow manually, so it will take the branch name you select and set the environment accordingly. For example, if you select main branch while triggering the workflow manually, it will set the environment to production.
    
    # Below I cant use environmnt variable DEPLOY_ENV to set the environment and rather i have to duolciate the logic BECAUSE job-level environment resolve hota hai before runtime env variables. So at the time of resolving the environment for the job, the DEPLOY_ENV variable is not yet set and hence it cannot be used in the environment key. This is a common scenario in GitHub Actions where job-level environment variables cannot be used to determine the environment for the job itself, as they are not yet available at the time of job initialization. Therefore, we have to duplicate the logic to set the environment directly based on the branch name in the environment key, ensuring that the correct environment is set for the job based on the branch that triggered it.
    environment: ${{ (github.ref_name == 'main' && 'production') || (github.ref_name == 'uat' && 'uat') || (github.ref_name == 'qa' && 'qa') || (github.ref_name == 'int' && 'int') }} 
    
    steps:

       # Print the Environment to which we are deploying. This is useful for debugging and ensuring that the correct environment is being targeted for deployment based on the branch name.
       - name: "Print Target Environment"
         run: |
           echo "Deploying to environment: ${{ env.DEPLOY_ENV }}" # This will print the environment that has been set for this job, which is determined by the branch name. For example
       
       # Checkout the code 
       - name: "Checkout code"
         uses: actions/checkout@v6
         with:
           fetch-depth: 0 # Fetch all history for all branches and tags

       # Just quickly check the values of
       - name: "Print values of currently checked out branch and event details"
         run: |
           echo "Branch/Ref Name: ${{ github.ref_name }}"  # This gives for eg main, uat, feature/abc etc. without refs/heads/ prefix
           echo "Event Name: ${{ github.event_name }}"     # This gives the event that triggered the workflow, for eg push, workflow_dispatch etc.
           echo "Ref: ${{ github.ref }}"                   # This gives the full ref that triggered the workflow, for eg refs/heads/main, refs/heads/uat, refs/heads/feature/abc etc. It includes the refs/heads/ prefix which indicates that it's a branch reference.
          
           # VIMP:The cirrent checkout branch is determined by the ref that triggered the workflow. So if the workflow was triggered by a push to main branch, then main branch will be checked out. If it was triggered by a push to feature/abc branch, then feature/abc branch will be checked out onto the latest commit of that branch. If it was triggered manually and you select main branch while triggering, then main branch will be checked out.
           echo "VIMP:The cirrent checkout branch is determined by the ref that triggered the workflow. So if the workflow was triggered by a push to main branch, then main branch will be checked out. If it was triggered by a push to feature/abc branch, then feature/abc branch will be checked out onto the latest commit of that branch. If it was triggered manually and you select main branch while triggering, then main branch will be checked out."
           git branch                                      # This will show the currently checked out branch with an asterisk (*) next to it. For example, if main branch is checked out, it will show * main. 
           echo " test_level in repository variable: ${vars.TEST_LEVEL}" # This is just to check if the value of TEST_LEVEL variable is coming correctly or not. This variable is used in the deployment step to specify the level of tests to run during deployment. By printing it here, we can confirm that it's being set correctly based on the inputs provided when triggering the workflow or from the repository variables.

       # Install salesforce cli    
       - name: "Install Salesforce CLI"
         run: |
           npm install @salesforce/cli --global
           which sf
           command -v sf
           pwd

      # Verify Salesforce CLI installation     
       - name: "Check if Salesforce CLI is working"
         run: command -v sf # Just this command is enough to check if the CLI is installed and working, because if the command is not found, it will return a non-zero exit code which will cause the workflow to fail. There is no need to check for version or any other command, as the presence of the sf command itself indicates that the CLI is installed and can be executed successfully.

          # EARLIER I WAS USING BELOW CODE TO CHECK IF THE CLI IS WORKING OR NOT, BUT IT WAS UNNECESSARY AND CAN BE SIMPLIFIED TO JUST CHECKING THE PRESENCE OF THE COMMAND USING command -v sf. THE REASON FOR THIS IS THAT IF THE CLI IS NOT INSTALLED OR NOT WORKING PROPERLY, THEN command -v sf WILL RETURN A NON-ZERO EXIT CODE, CAUSING THE WORKFLOW TO FAIL IMMEDIATELY. THERE IS NO NEED TO CHECK FOR VERSION OR ANY OTHER COMMAND, AS THE PRESENCE OF THE sf COMMAND ITSELF INDICATES THAT THE CLI IS INSTALLED AND CAN BE EXECUTED SUCCESSFULLY.
          #  if sf --version | grep "/" ; then
          #    echo "Salesforce CLI is installed and working."
          #  else
          #    echo "Salesforce CLI installation failed."
          #    exit 1
          #  fi
      
      # Create jwt key file from the content stored in GitHub secrets
       - name: "Create JWT Key File"
         run: |
           echo "${{ secrets.JWT_KEY_FILE_CONTENT }}" > server.key 
           # Set appropriate permissions for the key file i.e. RW for owner only
           chmod 600 server.key 


     # Verify that the JWT key file has been created successfully and has the correct permissions. This step is crucial to ensure that the authentication process can proceed without issues, as an improperly created key file can lead to authentication failures.
       - name: "Verify JWT Key File Creation"
         run: |
           if [ -f server.key ]; then
             echo "JWT key file created successfully."
             ls -l server.key # This will show the permissions of the file, which should be -rw------- (600) for security reasons.
           else
             echo "Failed to create JWT key file."
             exit 1
           fi      

      # Authenticate to Salesforce org using JWT-based flow
       - name: "Authenticate to Salesforce Org"
         run: |
           sf org login jwt --client-id ${{ secrets.CLIENT_ID }} --jwt-key-file server.key --username ${{ vars.USERNAME }} --set-default --instance-url ${{ vars.INSTANCE_URL }}


      # Verify authentication by displaying the authenticated org's username
       - name: "Verify Authentication"
         run: |
           sf org list  
           
       - name: "Deployment"
         run: |
            echo "Perform your validation steps here, such as running tests, static code analysis, or any other checks that are necessary to validate the changes against the target environment. This is where you would implement the specific validation logic that is relevant to your Salesforce deployment process, ensuring that the changes meet the required standards and do not introduce any issues before they are deployed to the respective environments."
            sf project deploy start --target-org ${{ vars.USERNAME }} -x manifest/package.xml --test-level ${{ vars.TEST_LEVEL }} --wait 60 
            

        
      # Cean up the JWT key file at last. This will ensure that the key file is not left on the runner after the workflow completes, enhancing security by minimizing the risk of unauthorized access to the key file.
       - name: "Clean Up JWT Key File"
         if: always() # This ensures that the cleanup step runs regardless of the success or failure of previous steps, ensuring that the key file is removed in all scenarios.
         run: |
           # Remove the JWT key file to prevent unauthorized access -f flag is used to force deletion without prompting for confirmation, which is useful in automated scripts to ensure that the cleanup process is not interrupted.
           rm -f server.key     

           # verify that the key file has been removed successfully
           # [ ... ] this is test command to check if the file exists. -f seraches for file only in the current directory and returns true if the file exists and is a regular file. 
           # CONT.. Other options are -d for directory, -e for existence (file or directory), etc. In this case, we want to check if the file still exists after attempting to remove it, 
           # CONT.. which would indicate a failure in the cleanup process.
           # Reason for using this [] over ls | grep is that the latter can be less reliable in scripts, especially if there are multiple files or if the file name contains spaces or special characters. The test command with -f provides a more direct and reliable way to check for the existence of a specific file.
           
           if [ -f server.key ]; then 
             echo "Failed to remove the JWT key file."
             exit 1 # Exit with a non-zero status to indicate failure, which can be useful for debugging and ensuring that the workflow does not proceed if the cleanup step fails.
           else
             echo "JWT key file removed successfully."
           fi
