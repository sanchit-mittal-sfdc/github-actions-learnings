<template>
    <lightning-card title="Agent Chat" icon-name="utility:chat">
        <div class="chat-container">

            <!-- Conversation Area -->
            <div class="chat-window">
                <template for:each={messages} for:item="message">
                    <div
                        key={message.id}
                        class={message.class}
                    >
                        <div class="sender-name">{message.sender}</div>
                        <div class="message-text">{message.text}</div>
                    </div>
                </template>

                <!-- Typing Indicator -->
                <template if:true={isLoading}>
                    <div class="chat-bubble agent typing">
                        <span></span><span></span><span></span>
                    </div>
                </template>
            </div>

            <!-- Input Area -->
            <lightning-layout class="input-bar" vertical-align="end">

                <!-- Message Input -->
                <lightning-layout-item flexibility="grow" padding="around-xx-small">
                    <lightning-input
                        type="text-area"
                        class="message-input"
                        placeholder="Type a message…"
                        value={currentMessage}
                        onchange={handleMessageChange}
                        onkeyup={handleKeyUp}
                        disabled={isLoading}
                    >
                    </lightning-input>
                </lightning-layout-item>
            
                <!-- Send Button -->
                <lightning-layout-item
                    flexibility="no-grow"
                    padding="around-xx-small"
                    class="send-btn-container"
                >
                    <lightning-button
                        variant="brand"
                        label="Send"
                        onclick={sendMessage}
                        disabled={isSendDisabled}
                    >
                    </lightning-button>
                </lightning-layout-item>
            
            </lightning-layout>
            

            <!-- Error -->
            <template if:true={errorMessage}>
                <div class="error-text">{errorMessage}</div>
            </template>

        </div>
    </lightning-card>
</template>
